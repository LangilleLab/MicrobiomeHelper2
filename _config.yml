title: "Microbiome Helper"
url: "https://microbiomehelper.ca"
baseurl: ""

# Theme
remote_theme: dieghernan/chulapa
theme: null

# Navigation & Style
chulapa-skin:
  skin: solar
  highlight:  solarized.light

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  
kramdown:
  input: GFM
  toc_levels: 1..6
  
navbar:
  style: fab
  expand: md
  nav:
